<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>游戏时间统计</title>
    <link rel="stylesheet" href="css/stats.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="app-header">
        <span class="app-title">游戏时间统计</span>
        <span class="app-subtitle">了解你的游戏习惯</span>
        <button class="refresh-btn" id="refreshBtn" title="刷新数据">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path
              d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
            ></path>
          </svg>
        </button>
      </div>
      <!-- rest unchanged -->
      <div class="summary-cards">
        <div class="summary-card">
          <div class="card-icon">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
          </div>
          <div class="card-body">
            <div class="card-label">总游戏时长</div>
            <div class="card-value" id="cardHours">0h</div>
          </div>
        </div>
        <div class="summary-card">
          <div class="card-icon">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="2" y="3" width="20" height="14" rx="2" />
              <line x1="8" y1="21" x2="16" y2="21" />
              <line x1="12" y1="17" x2="12" y2="21" />
            </svg>
          </div>
          <div class="card-body">
            <div class="card-label">游玩游戏</div>
            <div class="card-value" id="cardGames">0</div>
          </div>
        </div>
        <div class="summary-card">
          <div class="card-icon">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          </div>
          <div class="card-body">
            <div class="card-label">连续游玩</div>
            <div class="card-value" id="cardStreak">0 天</div>
          </div>
        </div>
        <div class="summary-card">
          <div class="card-icon">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
          </div>
          <div class="card-body">
            <div class="card-label">日均时长</div>
            <div class="card-value" id="cardAvg">0m</div>
          </div>
        </div>
      </div>
      <div class="control-bar">
        <div class="period-tabs">
          <button class="period-arrow" id="navPrev">&#8249;</button>
          <button class="period-tab active" data-period="week">周</button>
          <button class="period-tab" data-period="month">月</button>
          <button class="period-tab" data-period="year">年</button>
          <button class="period-tab" data-period="total">总计</button>
          <button class="period-arrow" id="navNext">&#8250;</button>
          <span class="period-label" id="periodLabel">本周</span>
        </div>
        <div class="chart-toggle-right">
          <div class="chart-type-btns">
            <button class="chart-btn active" data-chart="heatmap">
              热力图
            </button>
            <button class="chart-btn" data-chart="bar">柱状图</button>
            <button class="chart-btn" data-chart="line">折线图</button>
          </div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title-row">
          <span class="section-label">游玩趋势</span>
          <div class="chart-legend" id="chartLegend">
            <span class="legend-item"
              ><i style="background: #2d2d2d"></i>0</span
            >
            <span class="legend-item"
              ><i style="background: #9be9a8"></i><30m</span
            >
            <span class="legend-item"
              ><i style="background: #40c463"></i>30-60m</span
            >
            <span class="legend-item"
              ><i style="background: #30a14e"></i>1-2h</span
            >
            <span class="legend-item"
              ><i style="background: #216e39"></i>2h+</span
            >
          </div>
        </div>
        <div id="mainChart"></div>
      </div>
      <div class="analysis-row">
        <div class="chart-card half">
          <div class="chart-title-row">
            <span class="section-label">时段分布</span>
            <span class="section-hint" id="hourlyFilterHint">每小时日均分钟</span>
          </div>
          <div id="hourlyChart"></div>
        </div>
        <div class="chart-card half">
          <div class="chart-title-row">
            <span class="section-label">类型偏好</span>
            <span class="section-hint" id="genreFilterHint">全部时间</span>
          </div>
          <div id="genreChart"></div>
        </div>
      </div>
      <div class="game-section">
        <div class="section-label">近期游玩</div>
        <div class="game-grid" id="gameGrid">
          <div class="empty-hint">暂无数据，快去玩游戏吧</div>
        </div>
      </div>
      <div class="bottom-panels">
        <div class="game-section half">
          <div class="section-label">总时长排行</div>
          <div class="game-grid" id="topGameList">
            <div class="empty-hint">--</div>
          </div>
        </div>
        <div class="game-section half">
          <div class="section-label">最喜爱的游戏</div>
          <div class="game-grid" id="recentGameList">
            <div class="empty-hint">--</div>
          </div>
        </div>
      </div>
      <div class="legacy-banner" id="legacyBanner" style="display: none">
        部分数据来自累积时长估算，新会话将提供更精确的统计
      </div>
    </div>

    <script src="data.js"></script>
    <script src="js/vendor/echarts.min.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
